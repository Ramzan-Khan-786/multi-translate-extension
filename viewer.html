<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TextBridge PDF Viewer</title>
  <link rel="stylesheet" href="pdfjs/pdf_viewer.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="lex-pdf-viewer">
  <div id="viewerRoot">
    <div id="pdfToolbar" role="toolbar" aria-label="PDF controls">
      <div class="pdf-toolbar-group">
        <button id="zoomOutBtn" class="pdf-btn" type="button" aria-label="Zoom out">-</button>
        <button id="zoomInBtn" class="pdf-btn" type="button" aria-label="Zoom in">+</button>
        <select id="zoomSelect" aria-label="PDF zoom">
          <option value="page-width" selected>Page Width</option>
          <option value="page-fit">Page Fit</option>
          <option value="0.5">50%</option>
          <option value="0.75">75%</option>
          <option value="1">100%</option>
          <option value="1.25">125%</option>
          <option value="1.5">150%</option>
          <option value="2">200%</option>
        </select>
      </div>
      <div class="pdf-toolbar-group">
        <label for="pageNumberInput" class="pdf-toolbar-label">Page</label>
        <input id="pageNumberInput" type="number" min="1" step="1" value="1" />
        <span id="pageCountLabel">/ 0</span>
      </div>
      <div class="pdf-toolbar-group pdf-toolbar-toggles">
        <label class="pdf-toggle" for="ocrToggle">
          <input id="ocrToggle" type="checkbox" />
          <span>OCR</span>
        </label>
        <label class="pdf-toggle" for="lowResourceToggle">
          <input id="lowResourceToggle" type="checkbox" />
          <span>Lite</span>
        </label>
      </div>
      <div id="viewerStatus" class="pdf-toolbar-status" aria-live="polite"></div>
    </div>
    <div id="viewerNote"></div>
    <div id="viewerContainer">
      <div id="pdfPages" class="pdfViewer"></div>
    </div>
  </div>

  <script src="pdfjs/pdf.min.js"></script>
  <script src="pdfjs/pdf_viewer.js"></script>
  <script src="viewer.js"></script>
  <script src="content.js"></script>
</body>
</html>
