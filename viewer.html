<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TextBridge PDF Viewer</title>
  <link rel="stylesheet" href="pdfjs/pdf_viewer.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="lex-pdf-viewer">
  <div id="viewerRoot">
    <div id="pdfToolbar" role="toolbar" aria-label="PDF controls">
      <div class="pdf-toolbar-group">
        <button id="zoomOutBtn" class="pdf-btn" type="button" aria-label="Zoom out">-</button>
        <button id="zoomInBtn" class="pdf-btn" type="button" aria-label="Zoom in">+</button>
        <select id="zoomSelect" aria-label="PDF zoom">
          <option value="page-width" selected>Page Width</option>
          <option value="page-fit">Page Fit</option>
          <option value="0.5">50%</option>
          <option value="0.75">75%</option>
          <option value="1">100%</option>
          <option value="1.25">125%</option>
          <option value="1.5">150%</option>
          <option value="2">200%</option>
        </select>
      </div>
      <div class="pdf-toolbar-group">
        <label for="pageNumberInput" class="pdf-toolbar-label">Page</label>
        <input id="pageNumberInput" type="number" min="1" step="1" value="1" />
        <span id="pageCountLabel">/ 0</span>
      </div>
      <div class="pdf-toolbar-group pdf-toolbar-toggles">
        <label class="pdf-toggle" for="ocrToggle">
          <input id="ocrToggle" type="checkbox" />
          <span>OCR</span>
        </label>
        <label class="pdf-toggle" for="lowResourceToggle">
          <input id="lowResourceToggle" type="checkbox" />
          <span>Lite</span>
        </label>
      </div>
      <div class="pdf-toolbar-group pdf-toolbar-actions">
        <button
          id="openSearchBtn"
          class="pdf-btn pdf-action-btn"
          type="button"
          aria-expanded="false"
          aria-controls="searchPanel"
          title="Search in PDF (Ctrl+F)"
        >
          Find
        </button>
        <button id="highlightToggle" class="pdf-btn pdf-action-btn" type="button" aria-pressed="false" title="Highlight mode">Marker</button>
        <div id="highlightColors" class="pdf-highlight-colors" role="group" aria-label="Highlight colors">
          <button class="pdf-color-swatch" data-color="#ffe082" type="button" aria-label="Yellow highlight"></button>
          <button class="pdf-color-swatch" data-color="#c8e6c9" type="button" aria-label="Green highlight"></button>
          <button class="pdf-color-swatch" data-color="#bbdefb" type="button" aria-label="Blue highlight"></button>
          <button class="pdf-color-swatch" data-color="#f8bbd0" type="button" aria-label="Pink highlight"></button>
          <label class="pdf-color-swatch pdf-color-custom" title="Custom highlight color">
            <input id="highlightColorPicker" type="color" value="#ffe082" aria-label="Custom highlight color" />
          </label>
        </div>
        <button id="eraseToggle" class="pdf-btn pdf-action-btn" type="button" aria-pressed="false" title="Erase highlights">Erase</button>
        <button id="addBookmarkBtn" class="pdf-btn pdf-action-btn" type="button" title="Add bookmark">Bookmark</button>
        <button id="toggleBookmarksBtn" class="pdf-btn pdf-action-btn" type="button" aria-expanded="false" title="Show bookmarks">Marks</button>
        <button id="downloadPdfBtn" class="pdf-btn pdf-action-btn" type="button" title="Download PDF with highlights">Download</button>
      </div>
      <div id="viewerStatus" class="pdf-toolbar-status" aria-live="polite"></div>
    </div>
    <div id="viewerNote"></div>
    <div id="searchPanel" class="pdf-search-panel" hidden>
      <div class="pdf-search-header">
        <span class="pdf-search-title">Search PDF</span>
        <div class="pdf-search-header-actions">
          <span id="searchCount" class="pdf-search-count">0 / 0</span>
          <button id="closeSearchPanel" class="pdf-search-close" type="button" aria-label="Close search">X</button>
        </div>
      </div>
      <div class="pdf-search-controls">
        <input
          id="searchInput"
          type="search"
          placeholder="Search full PDF"
          autocomplete="off"
          spellcheck="false"
          aria-label="Search full PDF"
        />
        <button id="searchPrevBtn" class="pdf-search-nav" type="button" aria-label="Previous match">Prev</button>
        <button id="searchNextBtn" class="pdf-search-nav" type="button" aria-label="Next match">Next</button>
      </div>
      <div id="searchResults" class="pdf-search-results"></div>
      <div id="searchEmpty" class="pdf-search-empty">Type a word to search the full PDF.</div>
    </div>
    <div id="bookmarkPanel" class="pdf-bookmark-panel" hidden>
      <div class="pdf-bookmark-header">
        <span>Bookmarks</span>
        <button id="closeBookmarkPanel" class="pdf-bookmark-close" type="button" aria-label="Close bookmarks">X</button>
      </div>
      <div id="bookmarkList" class="pdf-bookmark-list"></div>
      <div id="bookmarkEmpty" class="pdf-bookmark-empty">No bookmarks yet.</div>
    </div>
    <div id="viewerContainer">
      <div id="pdfPages" class="pdfViewer"></div>
    </div>
  </div>

  <script src="pdfjs/pdf.min.js"></script>
  <script src="pdfjs/pdf_viewer.js"></script>
  <script src="viewer.js"></script>
  <script src="content.js"></script>
</body>
</html>
